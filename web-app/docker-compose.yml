version: '3.8'

services:
  backend:
    build:
      context: ./sunnify-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./sunnify-webclient
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped
